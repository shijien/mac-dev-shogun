<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="64" fill="url(#bgGradient)"/>

  <!-- Circle halo -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="#0ea5e9" stroke-width="4" opacity="0.4"/>

  <!-- Shogun helmet shape -->
  <g transform="translate(256 240)">
    <!-- Horns -->
    <path d="M -140 -40 C -110 -120 -40 -140 -10 -110 L -40 -20 Z"
          fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
    <path d="M 140 -40 C 110 -120 40 -140 10 -110 L 40 -20 Z"
          fill="#0f172a" stroke="#22c55e" stroke-width="4"/>

    <!-- Helmet main -->
    <path d="M -120 -10 L 0 -90 L 120 -10 L 90 120 L -90 120 Z"
          fill="#020617" stroke="#22c55e" stroke-width="4"/>

    <!-- Face mask -->
    <path d="M -70 10 L 0 40 L 70 10 L 60 95 L -60 95 Z"
          fill="#020617" stroke="#38bdf8" stroke-width="3"/>

    <!-- Eyes -->
    <circle cx="-28" cy="20" r="6" fill="#f97316"/>
    <circle cx="28" cy="20" r="6" fill="#f97316"/>

    <!-- Crest -->
    <circle cx="0" cy="-40" r="20" fill="url(#accentGradient)"/>
    <circle cx="0" cy="-40" r="10" fill="#0f172a"/>
  </g>

  <!-- Text -->
  <text x="50%" y="420" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
        font-size="40" fill="#e5e7eb" letter-spacing="4">
    MAC-DEV-SHOGUN
  </text>
</svg>
